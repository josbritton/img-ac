name: ci

on:
  push:

jobs:
  packer:
    runs-on: ubuntu-latest
    name: Run Packer
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup packer
        uses: hashicorp/setup-packer@c3d53c525d422944e50ee27b840746d6522b08de
        id: setup
        with:
          version: latest

      - name: Run `packer init`
        id: init
        run: "packer init ."

      - name: Run `packer fmt`
        id: format
        run: "packer fmt --recursive --check --diff --write=false ."

      - name: Run `packer validate` (syntax)
        id: validate
        run: "packer validate --no-warn-undeclared-var --syntax-only ."
